# Initial nginx config — HTTP only, for certbot certificate issuance.
# After obtaining certs, switch to nginx.conf (which has full SSL).

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    upstream backend {
        server backend:8000;
    }

    upstream frontend {
        server frontend:5173;
    }

    upstream mcp {
        server mcp-server:8000;
    }

    server {
        listen 80;
        server_name openinfra.space api.openinfra.space mcp.openinfra.space;

        # ACME challenge for certbot
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Serve normally (no redirect) until certs are obtained
        location /api/ {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location / {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
        }
    }
}

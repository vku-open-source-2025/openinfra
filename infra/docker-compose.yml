services:
  mongo:
    env_file: .env
    image: mongo:latest
    ports:
      - "${MONGO_PORT}:27017" # Exposed only internally in the network
    volumes:
      - mongo_data:/data/db
    networks:
      - app_network
    restart: unless-stopped

  mongo-express:
    image: mongo-express:latest
    env_file: .env
    ports:
      - "${MONGO_EXPRESS_PORT:-8081}:8081"
    environment:
      - ME_CONFIG_MONGODB_SERVER=mongo
      - ME_CONFIG_MONGODB_PORT=27017
      - ME_CONFIG_BASICAUTH_USERNAME=${ME_CONFIG_BASICAUTH_USERNAME}
      - ME_CONFIG_BASICAUTH_PASSWORD=${ME_CONFIG_BASICAUTH_PASSWORD}
    depends_on:
      - mongo
    networks:
      - app_network
    restart: unless-stopped

  redis:
    env_file: .env
    image: redis:7-alpine
    # ports:
    #   - "6379:6379"  # Hidden for security - internal only
    networks:
      - app_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ==================== Kafka for IoT ====================
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - app_network
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_log:/var/lib/zookeeper/log
    restart: unless-stopped

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      - zookeeper
    # ports:
    #   - "9092:9092"  # Hidden for security - internal only
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks:
      - app_network
    volumes:
      - kafka_data:/var/lib/kafka/data
    restart: unless-stopped

  # IoT Producer - receives HTTP from ESP8266, publishes to Kafka
  # Also bridges MQTT messages to Kafka
  iot-producer:
    build: ../iot_integration/producer
    ports:
      - "${IOT_PRODUCER_PORT:-8002}:8001"
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - KAFKA_IOT_TOPIC=iot-sensor-data
      - IOT_API_KEY=${IOT_API_KEY:-}
      - MQTT_HOST=host.docker.internal
      - MQTT_PORT=1883
      - MQTT_USER=${MQTT_USER:-openinfra}
      - MQTT_PASS=${MQTT_PASS}
      - MQTT_TOPICS=openinfra/sensors/#
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - kafka
    networks:
      - app_network
    restart: unless-stopped

  # IoT Consumer - consumes from Kafka, stores in MongoDB
  iot-consumer:
    build: ../backend
    command: python -m app.services.kafka_consumer
    environment:
      - MONGODB_URL=${MONGODB_URL}
      - DATABASE_NAME=${DATABASE_NAME}
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - KAFKA_IOT_TOPIC=iot-sensor-data
      - KAFKA_GROUP_ID=openinfra-iot-consumer
    depends_on:
      - mongo
      - kafka
    networks:
      - app_network
    restart: unless-stopped

  backend:
    env_file: .env
    build: ../backend
    command:
      - uvicorn
      - app.main:app
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --proxy-headers
      - --forwarded-allow-ips
      - "*"
    ports:
      - "${BACKEND_PORT}:8000"
    environment:
      - MONGODB_URL=${MONGODB_URL}
      - DATABASE_NAME=${DATABASE_NAME}
      - REDIS_URL=${REDIS_URL}
      - CSV_IMPORT_URL=${CSV_IMPORT_URL}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - VIETMAP_API_KEY=${VITE_VIETMAP_API_KEY}
      - SOSCONN_LLM_BASE_URL=${SOSCONN_LLM_BASE_URL:-http://llm-service:8000}
      - SOSCONN_LLM_TIMEOUT_SECONDS=${SOSCONN_LLM_TIMEOUT_SECONDS:-6}
      - COPILOT_TOKEN_FILE=/root/.config/github-copilot/token
    depends_on:
      - mongo
      - redis
      - llm-service
    volumes:
      - ../backend:/app
      - ../3rd_party:/app/3rd_party
      - ${COPILOT_AUTH_HOST_PATH:-/tmp/copilot-auth}:/root/.config/github-copilot:ro
    networks:
      - app_network
    restart: unless-stopped

  celery-worker:
    env_file: .env
    build: ../backend
    command: celery -A app.celery_app worker --loglevel=info
    environment:
      - MONGODB_URL=${MONGODB_URL}
      - DATABASE_NAME=${DATABASE_NAME}
      - REDIS_URL=${REDIS_URL}
      - CSV_IMPORT_URL=${CSV_IMPORT_URL}
      - CONTRIB_MONGO_URL=${CONTRIB_MONGO_URL}
      - AUTOIP_HOST=${AUTOIP_HOST:-192.168.1.1}
      - AUTOIP_PORT=${AUTOIP_PORT:-1443}
      - AUTOIP_USERNAME=${AUTOIP_USERNAME:-admin}
      - AUTOIP_PASSWORD=${AUTOIP_PASSWORD:-user@123456}
      - CF_API_TOKEN=${CF_API_TOKEN}
      - CF_ZONE_ID=${CF_ZONE_ID}
      - CF_DOMAIN=${CF_DOMAIN:-openinfra.space}
      - CF_RECORDS=${CF_RECORDS:-@ api mcp}
      - CF_PROXIED=${CF_PROXIED:-true}
    depends_on:
      - mongo
      - redis
      - backend
    volumes:
      - ../backend:/app
      - ../3rd_party:/app/3rd_party
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - app_network
    restart: unless-stopped

  celery-beat:
    env_file: .env
    build: ../backend
    command: celery -A app.celery_app beat --loglevel=info
    environment:
      - MONGODB_URL=${MONGODB_URL}
      - DATABASE_NAME=${DATABASE_NAME}
      - REDIS_URL=${REDIS_URL}
      - CSV_IMPORT_URL=${CSV_IMPORT_URL}
    depends_on:
      - mongo
      - redis
      - backend
    volumes:
      - ../backend:/app
      - ../3rd_party:/app/3rd_party
    networks:
      - app_network
    restart: unless-stopped

  frontend:
    env_file: .env
    build: ../frontend
    ports:
      - "${FRONTEND_PORT}:5173"
    environment:
      - VITE_BASE_API_URL=${VITE_BASE_API_URL}
      - VITE_LEADERBOARD_URL=${VITE_LEADERBOARD_URL}
    volumes:
      - ../frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    command: npm run dev -- --host 0.0.0.0
    restart: always
    networks:
      - app_network

  llm-service:
    env_file: .env
    build: ../3rd_party/sosconn/llm-service
    ports:
      - "${LLM_SERVICE_PORT:-8014}:8000"
    environment:
      - GITHUB_COPILOT_API_KEY=${GITHUB_COPILOT_API_KEY}
      - GITHUB_COPILOT_API_KEY_FILE=/root/.config/github-copilot/token
      - GITHUB_COPILOT_AUTH_DIR=/root/.config/github-copilot
      - GITHUB_COPILOT_BASE_URL=${GITHUB_COPILOT_BASE_URL:-https://models.inference.ai.azure.com}
      - GITHUB_COPILOT_CHAT_MODEL=${GITHUB_COPILOT_CHAT_MODEL:-gpt-4.1}
      - GITHUB_COPILOT_EMBEDDING_MODEL=${GITHUB_COPILOT_EMBEDDING_MODEL:-text-embedding-3-small}
    volumes:
      - ../3rd_party/sosconn/llm-service/app:/app/app
      - llm_vector_data:/app/data/vector_dbs
      - ${COPILOT_AUTH_HOST_PATH:-/tmp/copilot-auth}:/root/.config/github-copilot:ro
    networks:
      - app_network
    restart: unless-stopped

  # MCP Server - Model Context Protocol for AI assistants
  mcp-server:
    build: ../mcp-server
    ports:
      - "${MCP_PORT:-8003}:8000"
    environment:
      - OPENINFRA_API_URL=http://backend:8000
    depends_on:
      - backend
    networks:
      - app_network
    restart: unless-stopped

  # Nginx reverse proxy with SSL
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    depends_on:
      - backend
      - frontend
      - mcp-server
      - llm-service
    networks:
      - app_network
    restart: unless-stopped

  # Certbot for SSL certificates (DNS challenge via Cloudflare)
  certbot:
    image: certbot/dns-cloudflare
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/cloudflare:/cloudflare:ro
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --dns-cloudflare --dns-cloudflare-credentials /cloudflare/credentials.ini; sleep 12h & wait $${!}; done;'"
    networks:
      - app_network

volumes:
  mongo_data:
  zookeeper_data:
  zookeeper_log:
  kafka_data:
  llm_vector_data:

networks:
  app_network:
    driver: bridge

